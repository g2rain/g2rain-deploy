#!/usr/bin/env bash
# G2Rain deploy service mapping (bash-only, no python required)
#
# Format:
#   Each entry in SERVICES is: "repo|dir|compose_service|build_cmd"
#
# Notes:
# - repo: GitHub repo name under GIT_BASE
# - dir:  directory name under CODES_DIR (usually same as repo)
# - compose_service: service name in docker-compose.yml
# - build_cmd: command executed inside the repo directory to build the image

set -euo pipefail

# Where repos are checked out (relative to g2rain-deploy root)
CODES_DIR="./codes"

# GitHub base for cloning/pulling (can be overridden by env: G2RAIN_GIT_BASE)
GIT_BASE_DEFAULT="https://github.com/g2rain"

SERVICES=(
  "g2rain-infra|g2rain-infra|g2rain-infra|./build.sh"
  "g2rain-basis|g2rain-basis|g2rain-basis|./build.sh"
  "g2rain-iam|g2rain-iam|g2rain-iam|./build.sh"
  # repo != compose service (image built from g2rain-gateway-webflux, service is g2rain-gateway)
  "g2rain-gateway-webflux|g2rain-gateway-webflux|g2rain-gateway|./build.sh"
  "g2rain-cms|g2rain-cms|g2rain-cms|./build.sh"
  "g2rain-infra-app|g2rain-infra-app|g2rain-infra-app|./build.sh"
  "g2rain-manager-app|g2rain-manager-app|g2rain-manager-app|./build.sh"
  "g2rain-cms-app|g2rain-cms-app|g2rain-cms-app|./build.sh"
  "g2rain-main-shell|g2rain-main-shell|g2rain-main-shell|./build.sh"
  "g2rain-department-app|g2rain-department-app|g2rain-department-app|./build.sh"
)

